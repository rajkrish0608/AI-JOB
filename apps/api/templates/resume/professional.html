<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ full_name }} - Resume</title>
    <style>
        @page {
            size: A4;
            margin: 0.5in;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            font-size: 11pt;
            line-height: 1.3;
            color: #000;
            margin: 0;
            padding: 0;
        }
        h1 {
            font-size: 24pt;
            margin: 0 0 4px 0;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }
        .contact-info {
            text-align: center;
            font-size: 10pt;
            margin-bottom: 12px;
        }
        .summary {
            margin-bottom: 15px;
            text-align: justify;
        }
        .section {
            margin-bottom: 15px;
        }
        .section-heading {
            font-size: 12pt;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #000;
            margin-bottom: 6px;
            padding-bottom: 2px;
        }
        .section-content {
            margin-top: 4px;
        }
        /* Markdown generated HTML styles */
        ul {
            margin: 4px 0 10px 0;
            padding-left: 20px;
        }
        li {
            margin-bottom: 3px;
        }
        p {
            margin: 0 0 6px 0;
        }
        strong {
            font-weight: bold;
        }
        em {
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>{{ full_name }}</h1>
    <div class="contact-info">
        {{ contact_line }}
    </div>

    {% if professional_summary %}
    <div class="summary">
        {{ professional_summary }}
    </div>
    {% endif %}

    {% for section in sections %}
    <div class="section">
        <div class="section-heading">{{ section.heading }}</div>
        <div class="section-content">
            {{ section.content_html | safe }}
        </div>
    </div>
    {% endfor %}
</body>
</html>
